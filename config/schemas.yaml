# =============================================================================
# Bill Processor — Entry Type Schema Definitions
# =============================================================================
# This file drives the ENTIRE system: extraction prompts, sheet routing,
# row formatting, and validation. Adding a new entry type is as simple as
# adding a new block here — zero code changes required.
# =============================================================================

# Columns shared by ALL entry types (always written first in every sheet row).
common_columns:
  - name: "Timestamp"
    description: "Date & time of processing"
    required: true
  - name: "Entry Type"
    description: "ERP entry classification"
    required: true
  - name: "Confidence"
    description: "Extraction confidence — High / Medium / Low"
    required: true
  - name: "Supplier Name"
    description: "Name of the supplier / party"
    required: true
  - name: "Supplier GSTIN"
    description: "GSTIN of the supplier"
    required: false
  - name: "Bill Number"
    description: "Bill or invoice number"
    required: true
  - name: "Bill Date"
    description: "Date on the bill"
    required: true
  - name: "Total Amount"
    description: "Net or gross total amount"
    required: true
  - name: "Currency"
    description: "Currency code (default INR)"
    required: false
    default: "INR"
  - name: "Source"
    description: "Source channel"
    required: false
    default: "Telegram"
  - name: "Image Reference"
    description: "Telegram file ID of the source image"
    required: false

# Confidence scoring thresholds (based on field completeness percentage).
confidence:
  high_threshold: 80    # >= 80% of required fields filled
  medium_threshold: 50  # >= 50% of required fields filled
  # Below medium_threshold = Low

# -----------------------------------------------------------------------------
# Textile Industry Glossary
# -----------------------------------------------------------------------------
# Included in the Gemini prompt to help with word sense disambiguation.
# Words in the textile industry often have specific meanings.
# -----------------------------------------------------------------------------

glossary:
  - term: "finish / finished"
    meaning: "Fabric that has been processed (dyed, printed, etc.) — NOT 'completed'"
  - term: "Bill On: FINISH"
    meaning: "Billing is calculated on finished weight — it is a BILLING METHOD, not a document type"
  - term: "Fin Kgs"
    meaning: "Finished kilograms (weight after processing) — appears on ALL processing bills"
  - term: "grey / gray"
    meaning: "Raw, unprocessed, undyed fabric"
  - term: "lot"
    meaning: "A batch of fabric/yarn with specific characteristics"
  - term: "taka / thaan"
    meaning: "Roll of fabric"
  - term: "challan"
    meaning: "Delivery note / goods dispatch document"
  - term: "job work"
    meaning: "Outsourced processing work done on someone else's material"
  - term: "GRN"
    meaning: "Goods Receipt Note — document confirming receipt of goods"
  - term: "merge"
    meaning: "Combined lot of fabric from different sources"

# -----------------------------------------------------------------------------
# Entry Type Definitions
# -----------------------------------------------------------------------------
# Each entry type has:
#   - display_name:       Human-readable name (used in Telegram confirmation)
#   - sheet_name:         Google Sheet worksheet name
#   - description:        What this entry type represents
#   - document_purpose:   The business purpose (purchase / job_work_charge / goods_receipt / ledger / general)
#   - disambiguation:     Rules for when this type might be confused with another
#   - keywords:           Hints for the LLM classifier
#   - specific_columns:   Columns unique to this entry type
# -----------------------------------------------------------------------------

entry_types:
  grey_purchase:
    display_name: "Grey Purchase"
    sheet_name: "Grey_Purchase_Bills"
    description: "Purchase invoices for BUYING raw/grey (unprocessed, undyed) fabric from a supplier."
    document_purpose: "purchase"
    disambiguation: >
      Use this ONLY for invoices where we are BUYING raw/grey fabric.
      The fabric has NOT been dyed, printed, or processed — it is in its raw state.
      Key indicators: fabric described as 'grey', 'raw', unprocessed.
      Do NOT use for job work bills even if grey fabric is mentioned in the context
      of sending fabric for processing.
    keywords:
      - "grey"
      - "grey fabric"
      - "grey purchase"
      - "raw fabric"
    specific_columns:
      - name: "Fabric Type"
        description: "Grey fabric description (e.g., DOT KNIT MILANGE)"
        required: false
      - name: "Quantity"
        description: "Quantity in Meters or KG"
        required: true
      - name: "Rate"
        description: "Unit rate"
        required: true
      - name: "Lot Number"
        description: "Lot or order number"
        required: false
      - name: "No of Rolls (Taka)"
        description: "Number of rolls / taka / pieces"
        required: false
      - name: "HSN Code"
        description: "HSN code from the bill"
        required: false
      - name: "CGST Amount"
        description: "Central GST amount"
        required: false
      - name: "SGST Amount"
        description: "State GST amount"
        required: false
      - name: "IGST Amount"
        description: "Integrated GST amount"
        required: false
      - name: "Discount"
        description: "Discount amount as printed on the bill"
        required: false
      - name: "Freight"
        description: "Freight / transport charges as printed on the bill"
        required: false
      - name: "Insurance"
        description: "Insurance charges as printed on the bill"
        required: false
      - name: "Mill Delivery"
        description: "Mill delivery charges as printed on the bill"
        required: false
      - name: "Broker Name"
        description: "Name of the broker or agent (e.g., SHREE C.M)"
        required: false

  yarn_purchase:
    display_name: "Yarn Purchase"
    sheet_name: "Yarn_Purchase_Bills"
    description: "Purchase invoices for BUYING yarn from a supplier."
    document_purpose: "purchase"
    disambiguation: >
      Use this ONLY for invoices where we are BUYING yarn.
      Key indicators: yarn count mentioned (e.g., 30s, 40s), yarn type (combed/carded),
      quantity in KG, HSN codes in the 5200-5500 range.
    keywords:
      - "yarn"
      - "yarn purchase"
      - "combed"
      - "carded"
    specific_columns:
      - name: "Yarn Count"
        description: "Yarn count (e.g., 30s, 40s)"
        required: false
      - name: "Yarn Type"
        description: "Combed / Carded / Other"
        required: false
      - name: "Quantity (KG)"
        description: "Weight in kilograms"
        required: true
      - name: "Rate per KG"
        description: "Rate per kilogram"
        required: true
      - name: "HSN Code"
        description: "HSN code from the bill"
        required: false
      - name: "CGST Amount"
        description: "Central GST amount"
        required: false
      - name: "SGST Amount"
        description: "State GST amount"
        required: false
      - name: "IGST Amount"
        description: "Integrated GST amount"
        required: false

  finish_purchase:
    display_name: "Finish Purchase"
    sheet_name: "Finish_Purchase_Bills"
    description: "Purchase invoices for BUYING finished/processed fabric as a product from a supplier. The document is a SALE from the supplier TO our company."
    document_purpose: "purchase"
    disambiguation: >
      Use this ONLY for invoices where we are BUYING finished (already processed/dyed) fabric.
      This is a PURCHASE transaction — we are paying for finished goods.
      Do NOT use this for job work charge bills — those belong to grn_job.
      Do NOT use this for stock transfers or issue documents.
      CRITICAL: The word 'finish' in 'Bill On: FINISH' or 'Fin Kgs' does NOT indicate
      this type — those refer to billing method and finished weight, which appear on
      ALL dyeing/processing bills including job work bills.
      The key difference: in finish_purchase we are BUYING a product, in grn_job a
      processor is CHARGING US for work done on our own fabric.
    keywords:
      - "finish purchase"
      - "finished goods"
      - "finished fabric"
      - "processed fabric purchase"
    specific_columns:
      - name: "Process Type"
        description: "Type of process (Dyeing, Knitting, Printing, etc.)"
        required: false
      - name: "Challan Number"
        description: "Delivery challan number"
        required: false

      - name: "Item Name"
        description: "Description of the item"
        required: false
      - name: "UQC"
        description: "Unit of quantity (PCS, KGS, MTR)"
        required: false
      - name: "Lot Number"
        description: "Lot or merge number"
        required: false
      - name: "Pcs (Taka)"
        description: "Number of pieces / taka / rolls"
        required: false
      - name: "Quantity"
        description: "Quantity in the unit specified"
        required: true
      - name: "Rate"
        description: "Rate per unit"
        required: true
      - name: "HSN Code"
        description: "HSN code"
        required: false
      - name: "CGST Amount"
        description: "Central GST amount"
        required: false
      - name: "SGST Amount"
        description: "State GST amount"
        required: false
      - name: "IGST Amount"
        description: "Integrated GST amount"
        required: false
      - name: "Net Amount"
        description: "Final net / invoice amount"
        required: false

  grn_job:
    display_name: "GRN Entry - Job"
    sheet_name: "GRN_Job_Entries"
    description: "Tax invoices or challans from job workers/processors charging for work done on OUR fabric. The supplier did dyeing/knitting/printing work on fabric we sent them."
    document_purpose: "job_work_charge"
    disambiguation: >
      Use this for ANY bill where a processor, dyeing mill, knitting mill, or printing
      mill is charging us for work done on OUR material.
      Key indicators:
      - 'JOB WORK' in the document title or header
      - HSN 998821 or 9988xx (HSN codes for job work services)
      - Separate 'Grey Value' and 'Job Value' fields
      - 'Grey Kgs' vs 'Fin Kgs' columns showing weight before and after processing
      - Bill from a dyeing/printing/knitting mill
      CRITICAL: Even if the bill says 'TAX INVOICE' — if it is from a processing mill
      charging for dyeing/printing/knitting work, it IS grn_job, not finish_purchase.
      The word 'finish' in 'Bill On: FINISH' or 'Fin Kgs' means billing method and
      finished weight — it does NOT make this a finish_purchase.
    keywords:
      - "job work"
      - "job work charges"
      - "HSN 998821"
      - "HSN 9988"
      - "dyeing charges"
      - "knitting charges"
      - "printing charges"
      - "process charges"
      - "delivery challan"
      - "goods receipt note"
      - "inward challan"
      - "job work receipt"
      - "goods received"
    specific_columns:
      - name: "Job Number"
        description: "Job work reference number"
        required: false
      - name: "Process Name"
        description: "Process type (Dyeing / Knitting / Printing)"
        required: false
      - name: "Challan Number"
        description: "Delivery challan reference"
        required: false
      - name: "Received Quantity"
        description: "Quantity received"
        required: true
      - name: "Issued Quantity"
        description: "Quantity originally issued"
        required: false
      - name: "Lot Number"
        description: "Lot or merge number"
        required: false

  grn_process:
    display_name: "GRN Entry - Process"
    sheet_name: "GRN_Process_Entries"
    description: "Documents showing processed goods being RECEIVED BACK from a processor, typically a delivery challan or goods receipt note."
    document_purpose: "goods_receipt"
    disambiguation: >
      Use ONLY for documents showing processed goods being RECEIVED BACK from a processor.
      This is typically a delivery challan or receipt note, NOT a tax invoice for charges.
      If the document is a TAX INVOICE charging for processing work, use grn_job instead.
      Key difference from grn_job: this documents the RECEIPT of goods, not the CHARGES.
    keywords:
      - "process receipt"
      - "process challan"
      - "inward process"
      - "goods received from process"
    specific_columns:
      - name: "Receipt Id"
        description: "GRN receipt reference"
        required: false
      - name: "Job Id"
        description: "Linked job work ID"
        required: false
      - name: "Challan Number"
        description: "Delivery challan reference"
        required: false
      - name: "Item Name"
        description: "Name / description of item received"
        required: false
      - name: "Lot Number"
        description: "Lot or merge number"
        required: false
      - name: "Issued Quantity"
        description: "Quantity originally issued"
        required: false
      - name: "Received Quantity"
        description: "Quantity actually received"
        required: true

  grn_process_rf:
    display_name: "GRN Entry - Process RF"
    sheet_name: "GRN_ProcessRF_Entries"
    description: "Goods received from a refinishing or reprocessing operation."
    document_purpose: "goods_receipt"
    disambiguation: >
      Use this specifically for goods received from a REFINISHING or REPROCESSING operation.
      The goods were previously processed and are being processed again (re-finished).
      If this is the first processing, use grn_process or grn_job instead.
    keywords:
      - "process rf"
      - "refinish"
      - "reprocess"
      - "re-finish"
      - "re-process"
    specific_columns:
      - name: "Receipt Id"
        description: "GRN receipt reference"
        required: false
      - name: "Job Id"
        description: "Linked job work ID"
        required: false
      - name: "Challan Number"
        description: "Delivery challan reference"
        required: false
      - name: "Item Name"
        description: "Name / description of item"
        required: false
      - name: "Lot Number"
        description: "Lot or merge number"
        required: false
      - name: "Received Quantity"
        description: "Quantity received"
        required: true

  grn_sewing:
    display_name: "GRN Entry - Sewing"
    sheet_name: "GRN_Sewing_Entries"
    description: "Goods received from a sewing or stitching unit — typically finished garments."
    document_purpose: "goods_receipt"
    disambiguation: >
      Use this for goods received from a SEWING or STITCHING unit.
      Key indicators: style numbers, cut numbers, garment descriptions.
      If the document is about fabric processing (dyeing/printing), use grn_job or grn_process.
    keywords:
      - "sewing"
      - "stitching"
      - "garment"
      - "sewing challan"
      - "cut number"
    specific_columns:
      - name: "Style Number"
        description: "Style or design reference"
        required: false
      - name: "Cut Number"
        description: "Cut reference number"
        required: false
      - name: "Challan Number"
        description: "Delivery challan reference"
        required: false
      - name: "Received Quantity"
        description: "Quantity received"
        required: true
      - name: "Issued Quantity"
        description: "Quantity originally issued"
        required: false
      - name: "Item Name"
        description: "Description of garment / item"
        required: false
      - name: "Lot Number"
        description: "Lot or merge number"
        required: false

  ledger_outstanding:
    display_name: "Ledger & Outstanding"
    sheet_name: "Ledger_Outstanding"
    description: "Party ledger pages and outstanding balance statements."
    document_purpose: "ledger"
    disambiguation: >
      Use this for ledger pages, account statements, and outstanding balance reports.
      These are NOT invoices or bills — they show account history and balances.
      Key indicators: opening/closing balance, debit/credit columns, account statement header.
    keywords:
      - "ledger"
      - "outstanding"
      - "balance"
      - "account statement"
      - "tally"
    specific_columns:
      - name: "Party Name"
        description: "Name of the party / account"
        required: true
      - name: "Opening Balance"
        description: "Opening balance amount"
        required: false
      - name: "Debit Amount"
        description: "Total debit"
        required: false
      - name: "Credit Amount"
        description: "Total credit"
        required: false
      - name: "Closing Balance"
        description: "Closing balance amount"
        required: false
      - name: "Outstanding Amount"
        description: "Net outstanding"
        required: false
      - name: "Due Date"
        description: "Payment due date"
        required: false

  general_entry:
    display_name: "General Entry"
    sheet_name: "General_Entries"
    description: "Fallback for documents that do not fit any other entry type."
    document_purpose: "general"
    disambiguation: >
      Use this ONLY as a last resort when the document does not clearly fit any other type.
      Try to classify into a more specific type first.
    keywords:
      - "general"
      - "miscellaneous"
    specific_columns:
      - name: "Description"
        description: "General description of the entry"
        required: false
      - name: "Quantity"
        description: "Quantity if applicable"
        required: false
      - name: "Rate"
        description: "Rate if applicable"
        required: false
      - name: "HSN Code"
        description: "HSN code if present"
        required: false
      - name: "CGST Amount"
        description: "Central GST amount"
        required: false
      - name: "SGST Amount"
        description: "State GST amount"
        required: false
      - name: "IGST Amount"
        description: "Integrated GST amount"
        required: false
      - name: "Net Amount"
        description: "Final net amount"
        required: false
